<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>공모주비서 다운로드</title>
    <script>
      const IOS_URL = "https://apps.apple.com/app/id6764863997";
      const ANDROID_URL = "https://play.google.com/store/apps/details?id=com.yellowrocket.publicofferingshares";

      function storeUrlForDevice() {
        const ua = navigator.userAgent || "";
        const platform = navigator.platform || "";
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua) || (platform === "MacIntel" && navigator.maxTouchPoints > 1);
        if (isAndroid) return ANDROID_URL;
        if (isIOS) return IOS_URL;
        return null;
      }

      const targetStoreUrl = storeUrlForDevice();
      if (targetStoreUrl) {
        window.location.replace(targetStoreUrl);
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fe;
        --surface: #ffffff;
        --ink: #1f2024;
        --muted: #818c9a;
        --line: #eaeef7;
        --yellow: #fff854;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        word-break: keep-all;
      }

      main {
        width: min(100%, 420px);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.08);
      }

      img {
        width: 64px;
        height: 64px;
        border-radius: 18px;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: 1.8rem;
        line-height: 1.25;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-weight: 700;
        line-height: 1.6;
      }

      .actions {
        display: grid;
        gap: 10px;
        margin-top: 22px;
      }

      a {
        min-height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: #1f2024;
        color: white;
        font-weight: 900;
        text-decoration: none;
      }

      a.android {
        background: var(--yellow);
        color: var(--ink);
      }

      a.secondary {
        background: #f8fafc;
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./assets/app-icon.png" alt="공모주비서 앱 아이콘">
      <h1>공모주비서 다운로드</h1>
      <p>기기에 맞는 스토어로 자동 이동합니다. 이동하지 않으면 아래 버튼을 선택하세요.</p>
      <div class="actions">
        <a href="https://apps.apple.com/app/id6764863997">App Store</a>
        <a class="android" href="https://play.google.com/store/apps/details?id=com.yellowrocket.publicofferingshares">Google Play</a>
        <a class="secondary" href="./">마케팅 페이지로 돌아가기</a>
      </div>
    </main>
  </body>
</html>
